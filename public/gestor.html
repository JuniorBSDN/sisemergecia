<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVN // GESTÃO DE PRESTADORES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #f8fafc; color: #1e293b; }
        .hvn-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }

        /* Inputs Padrão HVN (Branco) */
        .input-hvn {
            @apply bg-white border border-slate-300 p-2.5 rounded-none text-sm text-slate-900 transition-all outline-none font-bold uppercase;
        }
        .input-hvn:focus { @apply border-emerald-600 ring-1 ring-emerald-600/20; }

        /* Campos de Saúde - Feedback */
        .prof-field { @apply border-l-4 border-l-emerald-600 bg-emerald-50/30; }
        .disabled-input { @apply opacity-30 cursor-not-allowed bg-slate-100 border-slate-200; }

        /* Tabela */
        .hvn-table th { @apply text-[10px] text-slate-400 uppercase font-black tracking-widest pb-4 border-b-2 border-slate-100; }
        .hvn-table td { @apply py-4 border-b border-slate-50; }

        /* Controle de Acesso */
        #main-content { display: none; }
        #login-overlay { display: flex; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #10b981; }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-overlay" class="fixed inset-0 z-[100] bg-slate-100 flex flex-col items-center justify-center p-6">
        <div class="max-w-md w-full hvn-card p-10 space-y-8 border-t-8 border-t-emerald-600">
            <div class="text-center">
                <h2 class="text-2xl font-black text-slate-900 italic tracking-tighter uppercase">Terminal Gestor</h2>
                <p class="text-emerald-600 text-[10px] font-bold uppercase tracking-[0.2em] mt-1 italic">Hospital Municipal de Vigia</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[9px] text-slate-400 font-black uppercase mb-1 block">Código CNES Unidade</label>
                    <input type="text" id="login_cnes" class="input-hvn w-full text-center text-xl tracking-widest" placeholder="0000000">
                </div>
                <div>
                    <label class="text-[9px] text-slate-400 font-black uppercase mb-1 block">Senha de Acesso</label>
                    <input type="password" id="login_senha" class="input-hvn w-full text-center text-2xl tracking-[0.5em]" placeholder="••••">
                </div>
                <button onclick="autenticarUnidade()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 uppercase text-xs italic transition-all shadow-lg shadow-emerald-100">
                    Sincronizar Terminal
                </button>
            </div>
            <p class="text-[8px] text-slate-400 text-center uppercase font-bold tracking-tighter">BackInfo Systems © 2026 // v2.0</p>
        </div>
    </div>

    <div id="main-content" class="max-w-[1400px] mx-auto p-6 animate-in fade-in duration-500">
        <header class="mb-10 flex justify-between items-center border-b-2 border-slate-200 pb-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-600 flex items-center justify-center text-white font-black text-2xl italic">H</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-slate-900 uppercase italic">Gestão de Prestadores</h1>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Unidade CNES: <span id="display-cnes" class="text-emerald-600 font-black">-------</span></p>
                </div>
            </div>
            <div class="text-right">
                <button onclick="encerrarSessao()" class="bg-slate-900 text-white text-[9px] px-4 py-2 font-black uppercase tracking-widest hover:bg-red-600 transition-colors italic">Sair do Terminal</button>
            </div>
        </header>

        <section class="hvn-card p-8 mb-10">
            <h2 id="form-title" class="text-slate-400 font-black uppercase text-[10px] tracking-[0.2em] flex items-center gap-2 mb-8">
                <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> // Cadastro de Credenciais
            </h2>

            <form id="form-prestador" class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <input type="hidden" id="edit-id" value="">

                <div class="md:col-span-6 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">Nome Completo (Sem Abreviar)</label>
                    <input type="text" id="nome" class="input-hvn" placeholder="NOME DO PRESTADOR" required>
                </div>
                <div class="md:col-span-3 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">CPF (Login Único)</label>
                    <input type="text" id="cpf" class="input-hvn text-emerald-700" placeholder="000.000.000-00" required>
                </div>
                <div class="md:col-span-3 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">Nascimento</label>
                    <input type="date" id="nascimento" class="input-hvn">
                </div>

                <div class="md:col-span-4 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">E-mail Institucional</label>
                    <input type="email" id="email" class="input-hvn" placeholder="usuario@hvn.com.br">
                </div>
                <div class="md:col-span-4 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">Telefone / Ramal</label>
                    <input type="text" id="telefone" class="input-hvn" placeholder="(91) 00000-0000">
                </div>
                <div class="md:col-span-4 flex flex-col gap-1">
                    <label class="text-[10px] text-emerald-600 font-bold uppercase">Função Operacional</label>
                    <select id="funcao" class="input-hvn border-emerald-100" onchange="verificarCargo()" required>
                        <option value="">SELECIONAR CARGO...</option>
                        <option value="medico">MÉDICO(A)</option>
                        <option value="enfermeiro">ENFERMEIRO(A)</option>
                        <option value="tecnico">TÉCNICO DE ENFERMAGEM</option>
                        <option value="recepcao">RECEPCIONISTA</option>
                        <option value="administrativo">ADMINISTRATIVO</option>
                    </select>
                </div>

                <div class="md:col-span-3 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">Conselho / UF</label>
                    <div class="flex gap-1">
                        <input type="text" id="conselho" placeholder="CRM" class="input-hvn w-2/3 prof-field">
                        <input type="text" id="uf" placeholder="PA" maxlength="2" class="input-hvn w-1/3 text-center prof-field">
                    </div>
                </div>
                <div class="md:col-span-3 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">Registro Profissional</label>
                    <input type="text" id="registro" placeholder="00000" class="input-hvn prof-field">
                </div>
                <div class="md:col-span-2 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">CBO (SUS)</label>
                    <input type="text" id="cbo" placeholder="0000-00" class="input-hvn prof-field">
                </div>
                <div class="md:col-span-4 flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">Especialidade Principal</label>
                    <input type="text" id="especialidade" placeholder="Ex: CLÍNICA MÉDICA" class="input-hvn prof-field">
                </div>

                <div class="md:col-span-12 flex justify-end gap-6 mt-6 pt-6 border-t border-slate-100">
                    <button type="button" onclick="resetForm()" class="text-slate-400 hover:text-slate-600 uppercase text-[10px] font-black italic">Limpar Campos</button>
                    <button type="submit" id="btn-submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 px-12 uppercase text-xs italic shadow-lg shadow-emerald-100 transition-all">
                        Gravar Prestador
                    </button>
                </div>
            </form>
        </section>

        <section class="hvn-card overflow-hidden">
            <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">// Profissionais Ativos na Unidade</span>
                <input type="text" onkeyup="filtrar(this.value)" placeholder="BUSCAR POR NOME OU CPF..." class="bg-white border border-slate-200 text-[10px] px-3 py-1.5 w-64 outline-none focus:border-emerald-500 font-bold">
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left hvn-table">
                    <thead>
                        <tr>
                            <th class="px-6 py-4">Profissional / CPF</th>
                            <th class="px-6 py-4">Função / Especialidade</th>
                            <th class="px-6 py-4">Conselho / CBO</th>
                            <th class="px-6 py-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-prestadores">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/prestadores';
        const AUTH_URL = 'http://localhost:5000/api/auth_unidade';
        let UNIDADE_AUTENTICADA = null;

        // --- LÓGICA DE ACESSO (CNES) ---
        async function autenticarUnidade() {
            const cnes = document.getElementById('login_cnes').value;
            const senha = document.getElementById('login_senha').value;

            try {
                const res = await fetch(AUTH_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ cnes, senha })
                });

                if(res.ok) {
                    UNIDADE_AUTENTICADA = cnes;
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    document.getElementById('display-cnes').innerText = cnes;
                    carregarPrestadores();
                } else {
                    alert("ACESSO NEGADO: CNES ou Senha Inválida.");
                }
            } catch (err) { alert("Motor SQL local desligado."); }
        }

        // --- GESTÃO DE INTERFACE ---
        function verificarCargo() {
            const funcao = document.getElementById('funcao').value;
            const isSaude = ['medico', 'enfermeiro', 'tecnico'].includes(funcao);
            document.querySelectorAll('.prof-field').forEach(field => {
                field.disabled = !isSaude;
                field.classList.toggle('disabled-input', !isSaude);
                if(!isSaude) field.value = "";
            });
        }

        function resetForm() {
            document.getElementById('form-prestador').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerHTML = '<span class="w-2 h-2 bg-emerald-500 rounded-full"></span> // Cadastro de Credenciais';
            document.getElementById('btn-submit').innerText = "Gravar Prestador";
            document.getElementById('btn-submit').classList.replace('bg-blue-600', 'bg-emerald-600');
            verificarCargo();
        }

        // --- OPERAÇÕES NO BANCO ---
        async function carregarPrestadores() {
            try {
                const res = await fetch(`${API_URL}?cnes=${UNIDADE_AUTENTICADA}`);
                const dados = await res.json();
                const lista = document.getElementById('lista-prestadores');
                lista.innerHTML = "";

                dados.forEach(p => {
                    lista.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="font-black text-slate-800 uppercase text-sm">${p.nome}</div>
                                <div class="text-[10px] text-emerald-600 font-mono italic">${p.cpf}</div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="bg-emerald-100 text-emerald-800 px-2 py-0.5 text-[9px] font-black uppercase">${p.funcao}</span>
                                <div class="text-[9px] text-slate-400 mt-1 uppercase italic">${p.especialidade || '-'}</div>
                            </td>
                            <td class="px-6 py-4 text-slate-500 font-mono text-[11px]">
                                ${p.conselho || ''}-${p.uf || ''}: ${p.registro || ''}<br>
                                <span class="text-[9px] text-slate-400">CBO: ${p.cbo || '-'}</span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex justify-center gap-6">
                                    <button onclick="prepararEdicao('${p.cpf}')" class="text-blue-600 hover:text-blue-800 font-black uppercase text-[10px] tracking-tighter italic">Alterar</button>
                                    <button onclick="excluir('${p.cpf}')" class="text-red-500 hover:text-red-700 font-black uppercase text-[10px] tracking-tighter italic">Revogar</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { console.error("Erro na carga SQL."); }
        }

        document.getElementById('form-prestador').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                cnes_unidade: UNIDADE_AUTENTICADA,
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                nascimento: document.getElementById('nascimento').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                funcao: document.getElementById('funcao').value,
                conselho: document.getElementById('conselho').value,
                uf: document.getElementById('uf').value,
                registro: document.getElementById('registro').value,
                cbo: document.getElementById('cbo').value,
                especialidade: document.getElementById('especialidade').value
            };

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if(res.ok) { carregarPrestadores(); resetForm(); }
        };

        async function excluir(cpf) {
            if(confirm(`REMOÇÃO CRÍTICA:\nDeseja revogar o acesso do CPF ${cpf}?`)) {
                await fetch(`${API_URL}/${cpf}?cnes=${UNIDADE_AUTENTICADA}`, { method: 'DELETE' });
                carregarPrestadores();
            }
        }

        function encerrarSessao() { location.reload(); }
        function filtrar(val) { /* Lógica de busca */ }
    </script>
</body>
</html>
